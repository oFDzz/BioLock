name: Build BioLock

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos + ldid
        run: |
          set -e
          brew install ldid make
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          set -e
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          cp -r /tmp/sdks/iPhoneOS16.5.sdk $THEOS/sdks/
          ls $THEOS/sdks/

      - name: Build package
        run: |
          set -e
          export PATH="$(brew --prefix make)/libexec/gnubin:$THEOS/bin:$PATH"
          gmake clean
          gmake package FINALPACKAGE=1
          ls -lh packages/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioLock-deb
          path: packages/*.deb
